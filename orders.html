<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>View Orders - Daves cool cars</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav>
    <a href="index.html">Home</a>
    <a href="create.html">Create Order</a>
    <a href="orders.html">View Orders</a>
  </nav>

  <div class="container">
    <div class="page-card">
      <div class="page-header">
        <h2 class="page-title">View Orders</h2>
        <p class="page-subtitle">
          Manage placed vehicle orders, generate invoices, and remove completed or invalid entries.
        </p>
      </div>

      <div class="actions">
        <button id="invoiceBtn" class="btn btn-primary" disabled onclick="sendInvoice()">Send Invoice</button>
        <button id="deleteBtn" class="btn btn-danger" disabled onclick="deleteOrders()">Delete Order</button>
      </div>

      <div class="table-wrap">
        <table id="ordersTable"></table>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
